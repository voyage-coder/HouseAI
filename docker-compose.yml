version: "3.9"

services:

  backend:
    build: ./backend
    container_name: houseai-backend

    ports:
      - "5000:5000"

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: houseai-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped